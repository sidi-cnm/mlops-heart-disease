name: Retrain Model

on:
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Retrain on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/mlops-heart-disease
            git pull origin main
            source ~/mlflow-env/bin/activate
            pip install dvc dvc-s3 pandas scikit-learn mlflow boto3 pyyaml
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            export AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}
            dvc repro --force
            dvc push
            cd app
            docker build -t heart-disease-api .
            docker stop heart-api || true
            docker rm heart-api || true
            docker run -d \
              --name heart-api \
              -p 8000:8000 \
              -v ~/mlops-heart-disease/params.yaml:/app/../params.yaml \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }} \
              heart-disease-api
            sleep 10
            curl -f http://localhost:8000/health || exit 1
            echo "Retrain and deploy successful!"